name: Update Roman Marktbericht (Quartalsweise)

on:
  schedule:
    # Quartalsweise: 1. Januar / 1. April / 1. Juli / 1. Oktober — jeweils 06:00 UTC
    # (~alle 90 Tage, an Quartalsanfängen für saubere Berichts-Periodisierung)
    - cron: '0 6 1 1,4,7,10 *'
  workflow_dispatch:       # Manuell auslösbar

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Marktbericht (aktuelles Quartal)
        run: node roman/scripts/generate-marktbericht.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet roman/marktanalyse/ roman/sitemap.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected!"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add roman/marktanalyse/ roman/sitemap.xml
          git commit -m "chore(roman): quarterly market report regeneration [automated]"
          git push
