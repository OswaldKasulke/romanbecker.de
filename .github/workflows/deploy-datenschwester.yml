name: Deploy Datenschwester

on:
  push:
    branches:
      - main
    paths:
      - 'datenschwester/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy datenschwester.de via FTP
        env:
          FTP_HOST: ${{ secrets.ROMAN_FTP_SERVER }}
          FTP_USER: ${{ secrets.ROMAN_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.ROMAN_FTP_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import ftplib, ssl, os

          host    = os.environ["FTP_HOST"]
          user    = os.environ["FTP_USER"]
          passwd  = os.environ["FTP_PASS"]
          local_dir   = "datenschwester"
          remote_base = "/datenschwester.de"
          # WordPress-Dateien und -Ordner nie überschreiben
          exclude = {
              ".git", ".DS_Store", "README.md",
              "wp-admin", "wp-includes", "wp-content",
              "wp-login.php", "wp-config.php", "wp-config-sample.php",
              "wp-blog-header.php", "wp-comments-post.php", "wp-cron.php",
              "wp-links-opml.php", "wp-load.php", "wp-mail.php",
              "wp-settings.php", "wp-signup.php", "wp-trackback.php",
              "wp-activate.php", "xmlrpc.php", "index.php", "index.htm",
              "license.txt", "readme.html", "liesmich.html",
          }

          ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
          ctx.check_hostname = False
          ctx.verify_mode    = ssl.CERT_NONE

          ftp = ftplib.FTP_TLS(context=ctx)
          ftp.connect(host, 21)
          ftp.auth()
          ftp.login(user, passwd)
          ftp.prot_p()

          for root, dirs, files in os.walk(local_dir):
              dirs[:] = [d for d in dirs if d not in exclude]
              rel = os.path.relpath(root, local_dir)
              remote_dir = remote_base if rel == "." else f"{remote_base}/{rel}"
              for fname in files:
                  if fname in exclude or any(fname.startswith(e) for e in exclude):
                      continue
                  local_path  = os.path.join(root, fname)
                  remote_path = f"{remote_dir}/{fname}"
                  with open(local_path, "rb") as f:
                      ftp.storbinary(f"STOR {remote_path}", f)
                  print(f"✅ {remote_path}")

          ftp.quit()
          PYEOF
