name: Update Roman Listings

on:
  schedule:
    - cron: '0 6 * * *'  # Täglich um 06:00 UTC
  workflow_dispatch:       # Manuell auslösbar

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volle History: generate-sitemap.py liest lastmod aus git log

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scraper
        run: node roman/scripts/update-listings.mjs

      - name: Update Stadtteil/Umland listings
        run: node roman/scripts/update-stadtteil-listings.mjs

      - name: Regenerate sitemap
        run: python3 roman/scripts/generate-sitemap.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet roman/index.html roman/en/index.html roman/bautraeger.html roman/stadtteile/ roman/sitemap.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected!"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add roman/index.html roman/en/index.html roman/bautraeger.html roman/stadtteile/ roman/sitemap.xml
          git commit -m "chore(roman): update Evernest listings + Standorte + Sitemap [automated]"
          git push
