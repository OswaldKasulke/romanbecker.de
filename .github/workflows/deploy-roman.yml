name: Deploy romanbecker.de via FTP

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'roman/**'
  workflow_dispatch:  # Manuell auslösbar (z. B. nach automatisiertem Listings-Commit)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHPMailer via Composer
        run: |
          cd roman
          composer install --no-dev --optimize-autoloader

      - name: Write SMTP config
        run: |
          cat > roman/smtp-config.php << 'EOF'
          <?php
          define('SMTP_HOST', 'w019d9c9.kasserver.com');
          define('SMTP_PORT', 587);
          define('SMTP_USER', 'webseite@romanbecker.de');
          define('SMTP_PASS', '${{ secrets.ROMAN_SMTP_PASS }}');
          define('REPORT_SECRET', '${{ secrets.ROMAN_REPORT_SECRET }}');
          EOF

      - name: FTP Deploy (Produktion)
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: w019d9c9.kasserver.com
          username: w019d9c9
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: roman/
          exclude: |
            **/leads.log
          server-dir: /romanbecker.de/root/
          protocol: ftp
          port: 21

      - name: IndexNow – geänderte Seiten an Bing/Yandex melden
        if: github.ref == 'refs/heads/main'
        run: |
          KEY="ad31390dcfcf4fdc03dea50343c9f4f2"
          # Neue + geänderte HTML-Seiten aus diesem Push (leer bei workflow_dispatch)
          FILES=$(jq -r '[.commits[]?.added[]?, .commits[]?.modified[]?] | unique[]' "$GITHUB_EVENT_PATH" 2>/dev/null | grep -E '^roman/.*\.html$' || true)
          if [ -z "$FILES" ]; then
            echo "Keine geänderten HTML-Seiten in diesem Push – IndexNow übersprungen."
            exit 0
          fi
          URLS=$(echo "$FILES" | sed 's#^roman/#https://romanbecker.de/#')
          echo "Melde an IndexNow:"; echo "$URLS"
          URLJSON=$(echo "$URLS" | jq -R . | jq -s .)
          BODY=$(jq -n --arg host "romanbecker.de" --arg key "$KEY" \
            --arg loc "https://romanbecker.de/$KEY.txt" --argjson urls "$URLJSON" \
            '{host:$host, key:$key, keyLocation:$loc, urlList:$urls}')
          code=$(curl -s -o /tmp/indexnow.out -w '%{http_code}' -X POST \
            "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" --data "$BODY")
          echo "IndexNow-Antwort: HTTP $code"
          cat /tmp/indexnow.out 2>/dev/null || true
          # Nicht-2xx soll den Deploy nicht rot färben
          case "$code" in 2*) echo "OK";; *) echo "::warning::IndexNow lieferte HTTP $code";; esac

      - name: FTP Deploy (Preview)
        if: github.ref == 'refs/heads/develop'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: w019d9c9.kasserver.com
          username: w019d9c9
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: roman/
          exclude: |
            **/leads.log
          server-dir: /preview/roman/
          protocol: ftp
          port: 21
