name: Deploy Roman

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHPMailer via Composer
        run: |
          cd roman
          composer install --no-dev --optimize-autoloader

      - name: Write SMTP config
        run: |
          cat > roman/smtp-config.php << 'EOF'
          <?php
          define('SMTP_HOST', 'w019d9c9.kasserver.com');
          define('SMTP_PORT', 587);
          define('SMTP_USER', 'webseite@romanbecker.de');
          define('SMTP_PASS', '${{ secrets.ROMAN_SMTP_PASS }}');
          EOF

      # Nur die nicht-versionierten PHP-Backend-Artefakte hochladen
      # (vendor/ + smtp-config.php). Die restlichen Dateien (HTML/CSS/JS)
      # übernimmt deploy-roman.yml via FTP-Deploy-Action — doppelter
      # Upload des gesamten roman/-Ordners hier entfernt, um Konflikte
      # zwischen den beiden Pipelines zu vermeiden.

      # ─── PREVIEW (develop branch) ──────────────────────────────────────────
      - name: Deploy PHP-Backend-Artefakte Preview (develop → preview/roman/)
        if: github.ref == 'refs/heads/develop'
        env:
          FTP_HOST: ${{ secrets.ROMAN_FTP_SERVER }}
          FTP_USER: ${{ secrets.ROMAN_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.ROMAN_FTP_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import ftplib, ssl, os

          host = os.environ["FTP_HOST"]
          user = os.environ["FTP_USER"]
          passwd = os.environ["FTP_PASS"]
          remote_base = "/preview/roman"

          ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          ftp = ftplib.FTP_TLS(context=ctx)
          ftp.connect(host, 21)
          ftp.auth()
          ftp.login(user, passwd)
          ftp.prot_p()

          def ensure_dir(ftp, path):
              try:
                  ftp.mkd(path)
              except ftplib.error_perm:
                  pass

          def upload_file(local_path, remote_path):
              with open(local_path, "rb") as f:
                  ftp.storbinary(f"STOR {remote_path}", f)
              print(f"✅ {remote_path}")

          # smtp-config.php
          upload_file("roman/smtp-config.php", f"{remote_base}/smtp-config.php")

          # vendor/ (komplette Composer-Abhängigkeiten)
          for root, dirs, files in os.walk("roman/vendor"):
              rel = os.path.relpath(root, "roman")
              remote_dir = f"{remote_base}/{rel}"
              ensure_dir(ftp, remote_dir)
              for fname in files:
                  upload_file(os.path.join(root, fname), f"{remote_dir}/{fname}")

          ftp.quit()
          PYEOF

      # ─── PRODUKTION (main branch) ──────────────────────────────────────────
      - name: Deploy PHP-Backend-Artefakte Produktion (main → romanbecker.de/root/)
        if: github.ref == 'refs/heads/main'
        env:
          FTP_HOST: ${{ secrets.ROMAN_FTP_SERVER }}
          FTP_USER: ${{ secrets.ROMAN_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.ROMAN_FTP_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import ftplib, ssl, os

          host = os.environ["FTP_HOST"]
          user = os.environ["FTP_USER"]
          passwd = os.environ["FTP_PASS"]
          remote_base = "/romanbecker.de/root"

          ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE

          ftp = ftplib.FTP_TLS(context=ctx)
          ftp.connect(host, 21)
          ftp.auth()
          ftp.login(user, passwd)
          ftp.prot_p()

          def ensure_dir(ftp, path):
              try:
                  ftp.mkd(path)
              except ftplib.error_perm:
                  pass

          def upload_file(local_path, remote_path):
              with open(local_path, "rb") as f:
                  ftp.storbinary(f"STOR {remote_path}", f)
              print(f"✅ {remote_path}")

          # smtp-config.php
          upload_file("roman/smtp-config.php", f"{remote_base}/smtp-config.php")

          # vendor/ (komplette Composer-Abhängigkeiten)
          for root, dirs, files in os.walk("roman/vendor"):
              rel = os.path.relpath(root, "roman")
              remote_dir = f"{remote_base}/{rel}"
              ensure_dir(ftp, remote_dir)
              for fname in files:
                  upload_file(os.path.join(root, fname), f"{remote_dir}/{fname}")

          ftp.quit()
          PYEOF
