name: Deploy Roman

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHPMailer via Composer
        run: |
          cd roman
          composer install --no-dev --optimize-autoloader

      - name: Write SMTP config
        run: |
          cat > roman/smtp-config.php << 'EOF'
          <?php
          define('SMTP_HOST', 'w019d9c9.kasserver.com');
          define('SMTP_PORT', 587);
          define('SMTP_USER', 'webseite@romanbecker.de');
          define('SMTP_PASS', '${{ secrets.ROMAN_SMTP_PASS }}');
          EOF

      # ─── PREVIEW (develop branch) ──────────────────────────────────────────
      - name: Deploy Preview via FTP (develop → preview/roman/)
        if: github.ref == 'refs/heads/develop'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ROMAN_FTP_SERVER }}
          username: ${{ secrets.ROMAN_FTP_USERNAME }}
          password: ${{ secrets.ROMAN_FTP_PASSWORD }}
          port: 21
          local-dir: ./roman/
          server-dir: /preview/roman/
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/README.md
            **/docs/**
            **/scripts/**

      # ─── PRODUKTION (main branch) ──────────────────────────────────────────
      - name: Deploy Produktion via FTP (main → romanbecker.de/root/)
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ROMAN_FTP_SERVER }}
          username: ${{ secrets.ROMAN_FTP_USERNAME }}
          password: ${{ secrets.ROMAN_FTP_PASSWORD }}
          port: 21
          local-dir: ./roman/
          server-dir: /romanbecker.de/root/
          state-name: .ftp-deploy-sync-state-roman.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/README.md
            **/docs/**
            **/scripts/**

      - name: Wait for FTP connection cooldown
        run: sleep 5

      - name: Deploy fuertedigital via FTP (main → fuertedigital/roman/)
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./roman/
          server-dir: /fuertedigital/roman/
          state-name: .ftp-deploy-sync-state-v3.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/README.md
            **/docs/**
            **/scripts/**
